# Hyprlock — Tela de bloqueio (inspirado no binnewbs/arch-hyprland)

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.config/hypr/current_wallpaper
    color = rgb(0,0,0)

    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Horas
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = rgba(cdd6f4ff)
    font_size = 112
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 0
    shadow_size = 0

    position = 0, 220
    halign = center
    valign = center
}

# Minutos
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgba(cdd6f4ff)
    font_size = 112
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 0
    shadow_size = 0

    position = 0, 80
    halign = center
    valign = center
}

# Dia da semana
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = rgba(7dd3fcee)
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -15
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = rgba(7dd3fcee)
    font_size = 14
    font_family = JetBrainsMono Nerd Font

    position = 0, -40
    halign = center
    valign = center
}

# Campo de senha
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3

    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1

    rounding = 22
    outer_color = rgba(0369a1ee)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <i>Senha...</i>

    position = 0, 120
    halign = center
    valign = bottom
}
